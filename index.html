<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MULTIFASES</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      caret-color: transparent;
      font-family: 'Inter', sans-serif;
      color: #F2F2F2;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: #0a0812; 
      overflow: hidden;
    }

    .particles-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: url('https://raw.githubusercontent.com/sophaemp3/multifases/refs/heads/main/2f3c45b8-60a1-462c-b1ad-9c11db064d6f.png') no-repeat center center;
      background-size: cover;
      background-attachment: fixed;
      opacity: 0.70; 
    }

    audio { display: none; }
    
    header, footer {
      padding: 2rem;
      text-align: center;
    }
    
    header h1 {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 3rem;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: color 0.2s;
      letter-spacing: -0.02em;
    }
    
    header h1:hover {
      color: #C18AFF;
    }
    
    header p {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      opacity: 0.8;
      letter-spacing: 0.05em;
    }
    
    .main-content {
      display: grid;
      grid-template-columns: 1fr 2fr;
      flex: 1;
      border-top: 1px solid rgba(255,255,255,0.08);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    
    .menu {
      padding: 3rem 2rem;
      border-right: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .display-area {
      padding: 3rem 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2rem;
    }
    
    .fase-titulo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      font-size: 1.4rem;
      color: #A695FF;
      margin-bottom: 1.5rem;
      cursor: pointer;
      transition: transform 0.2s, color 0.3s ease, text-shadow 0.3s ease, font-size 0.3s ease;
      position: relative;
      letter-spacing: 0.02em;
    }
    
    .fase-titulo:hover {
      color: #C18AFF;
      transform: translateX(4px);
    }
    
    .fase-titulo.activa {
      color: #FFFFFF;
      font-weight: 700;
      font-size: 1.6rem;
      animation: glow 1.5s ease-in-out infinite alternate;
      text-shadow: 0 0 10px #ffffffa0, 0 0 20px #C18AFF80;
    }
    
    @keyframes glow {
      from { text-shadow: 0 0 5px #ffffff40, 0 0 10px #C18AFF20; }
      to   { text-shadow: 0 0 10px #ffffffa0, 0 0 20px #C18AFF80; }
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-40px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .descripcion, .contenido {
      display: none;
      font-size: 1.15rem;
      line-height: 1.7;
      max-width: 800px;
      opacity: 0;
    }

    .descripcion.visible {
      display: block;
      animation: slideInLeft 0.6s ease-out forwards;
    }

    .contenido.visible {
      document.getElementById("intro-text").classList.remove("visible");
      display: block;
      animation: fadeIn 1s ease-in forwards;
    }

    #intro {
      display: none;
      opacity: 0;
      text-align: center;
      margin: 0 auto;
      /* Carga de la nueva imagen CURVAS2 detrás del texto */
      background: url('https://raw.githubusercontent.com/sophaemp3/multifases/refs/heads/main/CURVAS2.png') no-repeat center center;
      background-size: contain;
      /* Ajuste de espacio para que el texto quede centrado en el dibujo */
      padding: 8rem 5rem;
      width: 100%;
      max-width: 900px;
      transform: translateY(10px);
      transition: opacity 1s ease, transform 1s ease;
    }

    #intro.visible {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }
