<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MULTIFASES</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    /* ... (Mantienes todo el CSS original igual, solo añade esto al final) ... */
    
    .folder-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      margin-top: 2rem;
      transition: transform 0.3s ease;
    }
    
    .folder-container:hover { transform: scale(1.05); }
    
    .folder-container img { width: 120px; height: auto; }
    
    .folder-container p { margin-top: 0.5rem; font-family: 'Space Grotesk', sans-serif; font-size: 1rem; }

    .project-content {
      display: none;
      margin-top: 2rem;
      animation: fadeIn 0.5s ease;
    }
    
    .back-btn {
      display: inline-block;
      margin-bottom: 1rem;
      color: #A695FF;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="cont1" class="contenido">
    <p>La primera capa de la identidad.</p>
    
    <div id="folder-derecho" class="folder-container" onclick="abrirProyecto('proyecto-derecho')">
      <img src="https://raw.githubusercontent.com/sophaemp3/multifases/refs/heads/main/Carpeta%20blanca.png" alt="Carpeta">
      <p>Derecho a Soluciones</p>
    </div>

    <div id="proyecto-derecho" class="project-content">
      <span class="back-btn" onclick="cerrarProyecto('proyecto-derecho')">← Volver a Atuendo</span>
      <div class="portfolio-gallery">
        <img src="https://raw.githubusercontent.com/sophaemp3/multifases/refs/heads/main/Marca%20Derecho%20a%20Soluciones%20(2).png" alt="Marca" onclick="abrirVisor(this.src)">
        <img src="https://raw.githubusercontent.com/sophaemp3/multifases/refs/heads/main/Redes%20sociales.png" alt="Redes" onclick="abrirVisor(this.src)">
      </div>
    </div>
  </div>

  <script>
    // Función para abrir la carpeta
    function abrirProyecto(id) {
      document.getElementById('folder-derecho').style.display = 'none';
      document.getElementById(id).style.display = 'block';
    }

    // Función para volver
    function cerrarProyecto(id) {
      document.getElementById(id).style.display = 'none';
      document.getElementById('folder-derecho').style.display = 'flex';
    }

    // ... (Mantener tus funciones originales mostrarFase, abrirVisor, etc) ...
  </script>
</body>
</html>
